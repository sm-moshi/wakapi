# Wakapi — DHI-hardened fork
# Builds and pushes to ghcr.io/sm-moshi/wakapi
when:
  - event: manual
  - event: push
    branch: main
    path:
      include: ["**/*.go", "go.*", "Dockerfile", ".woodpecker/**"]

steps:
  - name: build-and-push-ghcr
    image: woodpeckerci/plugin-docker-buildx:6.0.4@sha256:765ebfaa6f71383197babb2352c7902bafe141e6232a62cafb740510a788c550
    privileged: true
    settings:
      registry: ghcr.io
      repo: ghcr.io/sm-moshi/wakapi
      dockerfile: Dockerfile
      platforms: linux/amd64
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      logins:
        - registry: ghcr.io
          username: sm-moshi
          password:
            from_secret: github_token
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_password
      provenance: mode=max
      buildkit_driveropt: network=host
